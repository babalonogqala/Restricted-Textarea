<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restricted Textarea</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161618;
      --surface-2: #1e1e21;
      --border: #2c2c31;
      --border-focus: #4a4a55;
      --text: #f0f0f2;
      --text-muted: #606068;
      --text-dim: #909099;
      --accent: #7c6cfc;
      --accent-glow: rgba(124, 108, 252, 0.18);
      --warn: #f59e0b;
      --warn-glow: rgba(245, 158, 11, 0.12);
      --danger: #ef4444;
      --danger-glow: rgba(239, 68, 68, 0.15);
      --success: #22c55e;
      --radius: 14px;
      --max: 280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* ambient glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(124,108,252,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 75% 80%, rgba(239,68,68,.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── card ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.4rem 2.2rem;
      position: relative;
      overflow: hidden;
    }

    /* top stripe accent */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), #a78bfa, #6366f1);
      border-radius: 20px 20px 0 0;
    }

    /* ── header ── */
    .header {
      margin-bottom: 1.8rem;
    }

    .header__label {
      font-family: 'Syne', sans-serif;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: .45rem;
    }

    .header__title {
      font-family: 'Syne', sans-serif;
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--text);
      line-height: 1.15;
    }

    .header__sub {
      font-size: .84rem;
      color: var(--text-muted);
      margin-top: .4rem;
      line-height: 1.6;
    }

    /* ── textarea wrapper ── */
    .field {
      position: relative;
    }

    .field__label {
      display: block;
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .6rem;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .88rem;
      line-height: 1.7;
      padding: 1rem 1.1rem;
      outline: none;
      transition:
        border-color .2s,
        box-shadow .2s,
        background .2s;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    /* focus — default (normal state) */
    textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(74,74,85,.18);
    }

    /* ── states driven by JS classes on .field ── */

    /* warning — near limit */
    .field.warn textarea {
      border-color: var(--warn);
      box-shadow: 0 0 0 3px var(--warn-glow);
      background: rgba(245,158,11,.04);
    }

    /* at limit */
    .field.limit textarea {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px var(--danger-glow);
      background: rgba(239,68,68,.04);
    }

    /* ── counter row ── */
    .counter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: .75rem;
      gap: .5rem;
    }

    /* status message */
    .status-msg {
      font-size: .76rem;
      color: var(--text-muted);
      transition: color .2s;
      min-height: 1.1em;
    }

    .field.warn  .status-msg { color: var(--warn); }
    .field.limit .status-msg { color: var(--danger); font-weight: 500; }

    /* character counter pill */
    .counter-pill {
      display: flex;
      align-items: center;
      gap: .35rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .28rem .8rem;
      transition: border-color .2s, background .2s;
    }

    .field.warn  .counter-pill { border-color: var(--warn);   background: var(--warn-glow); }
    .field.limit .counter-pill { border-color: var(--danger); background: var(--danger-glow); }

    .counter-pill__current {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      font-weight: 500;
      color: var(--text);
      transition: color .2s;
    }

    .field.warn  .counter-pill__current { color: var(--warn); }
    .field.limit .counter-pill__current { color: var(--danger); }

    .counter-pill__sep {
      font-size: .7rem;
      color: var(--text-muted);
    }

    .counter-pill__max {
      font-family: 'DM Mono', monospace;
      font-size: .82rem;
      color: var(--text-muted);
    }

    /* ── progress bar ── */
    .progress-bar {
      margin-top: 1rem;
      height: 4px;
      background: var(--surface-2);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar__fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: var(--accent);
      transition: width .15s ease, background .2s;
    }

    .field.warn  .progress-bar__fill { background: var(--warn); }
    .field.limit .progress-bar__fill { background: var(--danger); }

    /* ── action row ── */
    .action-row {
      display: flex;
      gap: .7rem;
      margin-top: 1.4rem;
    }

    .btn-clear {
      flex: 1;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .65rem 1.2rem;
      color: var(--text-dim);
      font-family: 'Syne', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .04em;
      cursor: pointer;
      transition: border-color .2s, color .2s, transform .15s;
    }

    .btn-clear:hover {
      border-color: var(--text-dim);
      color: var(--text);
      transform: translateY(-1px);
    }

    .btn-submit {
      flex: 2;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: .65rem 1.4rem;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: .8rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .btn-submit:hover {
      opacity: .88;
      transform: translateY(-1px);
    }

    .btn-submit:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>

  <div class="card">

    <div class="header">
      <p class="header__label">DOM Project — Restricted Textarea</p>
      <h1 class="header__title">Leave a Message</h1>
      <p class="header__sub">Type below. The counter updates live and the border turns red when you hit the limit.</p>
    </div>

    <!-- field wrapper — JS adds .warn / .limit here -->
    <div class="field" id="field">

      <label class="field__label" for="textarea">Your message</label>

      <textarea
        id="textarea"
        placeholder="Start typing your message here…"
        maxlength="280"
      ></textarea>

      <div class="counter-row">
        <span class="status-msg" id="statusMsg">280 characters remaining</span>
        <div class="counter-pill">
          <span class="counter-pill__current" id="currentCount">0</span>
          <span class="counter-pill__sep">/</span>
          <span class="counter-pill__max">280</span>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-bar__fill" id="progressFill"></div>
      </div>

    </div><!-- /field -->

    <div class="action-row">
      <button class="btn-clear" id="btnClear">Clear</button>
      <button class="btn-submit" id="btnSubmit" disabled>Submit Message</button>
    </div>

  </div>

       =============================================
       Constants you'll need:
         const MAX = 280;
         const WARN_THRESHOLD = 0.85; // 85% = 238 chars

       Elements:
         • #textarea        — the textarea
         • #field           — wrapper; add/remove classes "warn" and "limit"
         • #currentCount    — shows chars typed (e.g. "173")
         • #statusMsg       — readable message ("107 characters remaining" / "Limit reached!")
         • #progressFill    — set its style.width as a % of MAX
         • #btnClear        — clears textarea, resets everything
         • #btnSubmit       — disabled when 0 chars; enable when user has typed something

       Logic on every 'input' event:
         1. Get textarea.value.length
         2. Update #currentCount text
         3. Update #statusMsg  ("X characters remaining" or "Limit reached!")
         4. Update #progressFill width  → (count / MAX * 100) + '%'
         5. Toggle .warn on #field when count >= MAX * WARN_THRESHOLD
         6. Toggle .limit on #field when count >= MAX
         7. Toggle disabled on #btnSubmit (disabled when count === 0)

       Clear button:
         - Reset value, counter, progress, classes, status message
  ================================================= -->

</body>
</html>
